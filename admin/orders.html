<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Tracking | Ayurveda Botanicals</title>
    <meta name="description" content="Ayurveda Botanicals order fulfillment tracking.">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="admin-page">

    <!-- Admin Sidebar -->
    <aside class="admin-sidebar">
        <div class="admin-brand">Ayurveda<span>Command</span></div>
        <nav class="admin-nav">
            <a href="./dashboard.html" class="admin-nav-link">Dashboard Overview</a>
            <a href="./products.html" class="admin-nav-link">Inventory Lab</a>
            <a href="./orders.html" class="admin-nav-link active">Order Tracking</a>
            <a href="../index.html" class="admin-nav-link" style="margin-top:auto; background:rgba(0,0,0,0.2);">← Storefront Home</a>
        </nav>
    </aside>

    <!-- Admin Main Content -->
    <main class="admin-main">
        <div class="admin-header-bar">
            <div>
                <h1 class="admin-title">Order Fulfillment Tracking</h1>
                <p style="color:var(--text-muted); font-size:1.1rem;">Manage alchemical dispatch statuses in real-time</p>
            </div>
            <div style="display:flex; align-items:center; gap:1rem; font-weight:600; color:var(--deep-green);">
                <span>📦 Real-Time Dispatch Engine</span>
            </div>
        </div>

        <div class="admin-table-container">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Order Reference</th>
                        <th>Customer</th>
                        <th>Sacred Date</th>
                        <th>Total Value</th>
                        <th>Fulfillment Action</th>
                    </tr>
                </thead>
                <tbody class="admin-orders-tbody">
                    <!-- Dynamically populated by JS -->
                </tbody>
            </table>
        </div>
    </main>

    <script src="../assets/js/store.js"></script>
    <script src="../assets/js/admin.js"></script>
</body>
</html>
